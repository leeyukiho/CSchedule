<!doctype html>

    body {
      font-family: sans-serif;
    }

    fieldset {
      margin: 12px 0;
    }

    label {
      display: block;
      margin: 8px 0;
    }

    input {
      margin-left: 8px;
    }

    textarea {
      width: 100%;
      max-width: 900px;
    }

    pre {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 8px;
      min-height: 40px;
    }

    .tabs button {
      margin-right: 8px;
    }

    .tabs button.active {
      font-weight: bold;
    }

    .hint {
      color: #555;
      font-size: 14px;
      margin: 4px 0 10px;
    }

    .endpoint-path {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

    const app = document.getElementById('app')
    const tabsNode = document.getElementById('tabs')
    const template = document.getElementById('endpointTemplate')
    const baseUrlInput = document.getElementById('baseUrl')
    const adminKeyInput = document.getElementById('adminKey')
    let activeTab = 'user'

    function loadConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}')
        if (saved.baseUrl) baseUrlInput.value = saved.baseUrl
        if (saved.adminKey) adminKeyInput.value = saved.adminKey
        if (saved.activeTab) activeTab = saved.activeTab
      } catch (error) {
        console.warn(error)
      }
    }

    function saveConfig() {
      localStorage.setItem(CONFIG_KEY, JSON.stringify({
        baseUrl: baseUrlInput.value.trim(),
        adminKey: adminKeyInput.value.trim(),
        activeTab,
      }))
      alert('已保存')
    }

    function makeHint(text) {
      const node = document.createElement('div')
      node.className = 'hint'
      node.textContent = text
      return node
    }

    function makeInput(name, label, value, hint) {
      const wrapper = document.createElement('div')
      const labelNode = document.createElement('label')
      const input = document.createElement('input')
      input.name = name
      input.value = value || ''
      input.size = 60
      labelNode.textContent = label + ' '
      labelNode.appendChild(input)
      wrapper.appendChild(labelNode)
      if (hint) wrapper.appendChild(makeHint(hint))
      return wrapper
    }

    function makeTextarea(name, label, value, hint) {
      const wrapper = document.createElement('div')
      const labelNode = document.createElement('label')
      const textarea = document.createElement('textarea')
      textarea.name = name
      textarea.rows = 10
      textarea.cols = 90
      textarea.value = JSON.stringify(value || {}, null, 2)
      labelNode.textContent = label
      wrapper.appendChild(labelNode)
      wrapper.appendChild(document.createElement('br'))
      wrapper.appendChild(textarea)
      if (hint) wrapper.appendChild(makeHint(hint))
      return wrapper
    }

    function getFieldValues(section) {
      const values = {}
      section.querySelectorAll('input, textarea').forEach((field) => {
        values[field.name] = field.value
      })
      return values
    }

    function fillPath(path, values) {
      return path.replace(/\{([^}]+)\}/g, (_, name) => {
        return encodeURIComponent(values[name] || '')
      })
    }

    function appendQuery(url, endpoint, values) {
      const query = new URLSearchParams()
        ; (endpoint.query || []).forEach(([name]) => {
          const value = values[name]
          if (value !== undefined && value !== '') query.set(name, value)
        })
      const text = query.toString()
      return text ? url + '?' + text : url
    }

    function parseBody(endpoint, values) {
      if (!endpoint.body) return undefined
      const raw = values.__body || '{}'
      return JSON.parse(raw)
    }

    function getBaseUrl() {
      return baseUrlInput.value.trim().replace(/\/+$/, '')
    }

    async function callEndpoint(endpoint, section) {
      const result = section.querySelector('.result')
      result.textContent = '请求中...'

      try {
        const values = getFieldValues(section)
        const path = fillPath(endpoint.path, values)
        const url = appendQuery(getBaseUrl() + path, endpoint, values)
        const headers = {}
        const options = {
          method: endpoint.method,
          headers,
        }

        if (endpoint.admin) {
          headers['x-admin-api-key'] = adminKeyInput.value.trim()
        }

        const body = parseBody(endpoint, values)
        if (body !== undefined) {
          headers['content-type'] = 'application/json'
          options.body = JSON.stringify(body)
        }

        const response = await fetch(url, options)
        const contentType = response.headers.get('content-type') || ''
        const data = contentType.includes('application/json')
          ? await response.json()
          : await response.text()

        result.textContent = JSON.stringify({
          request: {
            method: endpoint.method,
            url,
            body,
          },
          status: response.status,
          ok: response.ok,
          data,
        }, null, 2)
      } catch (error) {
        result.textContent = String(error && error.stack ? error.stack : error)
      }
    }

    function renderTabs() {
      tabsNode.textContent = ''
      tabs.forEach((tab) => {
        const button = document.createElement('button')
        button.type = 'button'
        button.textContent = tab.name
        if (tab.id === activeTab) button.className = 'active'
        button.addEventListener('click', () => {
          activeTab = tab.id
          saveConfigWithoutAlert()
          render()
        })
        tabsNode.appendChild(button)
      })
    }

    function saveConfigWithoutAlert() {
      localStorage.setItem(CONFIG_KEY, JSON.stringify({
        baseUrl: baseUrlInput.value.trim(),
        adminKey: adminKeyInput.value.trim(),
        activeTab,
      }))
    }

    function renderEndpoint(endpoint) {
      const fragment = template.content.cloneNode(true)
      const section = fragment.querySelector('fieldset')
      const legend = fragment.querySelector('legend')
      const pathNode = fragment.querySelector('.endpoint-path')
      const description = fragment.querySelector('.endpoint-description')
      const fields = fragment.querySelector('.fields')
      const button = fragment.querySelector('.send')

      legend.textContent = endpoint.group + ' - ' + endpoint.name
      pathNode.textContent = endpoint.method + ' ' + endpoint.path
      description.textContent = endpoint.description || ''
        ; (endpoint.params || []).forEach(([name, label, value, hint]) => {
          fields.appendChild(makeInput(name, label, value, hint))
        })
        ; (endpoint.query || []).forEach(([name, label, value, hint]) => {
          fields.appendChild(makeInput(name, label, value, hint))
        })
      if (endpoint.body) {
        fields.appendChild(makeTextarea('__body', endpoint.bodyLabel || '请求体 JSON', endpoint.body, endpoint.bodyHint || ''))
      }

      button.textContent = '调用：' + endpoint.name
      button.addEventListener('click', () => callEndpoint(endpoint, section))
      app.appendChild(fragment)
    }

    function render() {
      renderTabs()
      app.textContent = ''
      let currentGroup = ''
      endpoints
        .filter((endpoint) => endpoint.tab === activeTab)
        .forEach((endpoint) => {
          if (endpoint.group !== currentGroup) {
            currentGroup = endpoint.group
            const heading = document.createElement('h2')
            heading.textContent = currentGroup
            app.appendChild(heading)
          }
          renderEndpoint(endpoint)
        })
    }

    document.getElementById('saveConfig').addEventListener('click', saveConfig)
    document.getElementById('clearOutput').addEventListener('click', () => {
      document.querySelectorAll('pre.result').forEach((node) => {
        node.textContent = ''
      })
    })

    loadConfig()
    render()
  </script>
</body>

</html>
